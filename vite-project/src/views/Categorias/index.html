<section class="container section reveal">
  <header class="page-header">
    <div class="page-header__copy">
      <h1 class="page-header__title" data-i18n="categories.title">Categorías</h1>
      <p class="page-header__subtitle" data-i18n="categories.subtitle">
        Organiza los productos en categorías claras.
      </p>
    </div>
    <div class="page-header__actions">
      <a href="#crearcategorias" class="btn" data-i18n="categories.new">Nueva categoría</a>
    </div>
  </header>

  <div class="tabla card--table reveal">
    <div class="table-wrap">
      <table id="tabla">
        <caption data-i18n="categories.listTitle">Listado de categorías</caption>
        <thead>
          <tr>
            <th scope="col" data-i18n="categories.name">Nombre</th>
            <th scope="col" data-i18n="categories.description">Descripción</th>
            <th scope="col" data-i18n="common.actions">Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>
