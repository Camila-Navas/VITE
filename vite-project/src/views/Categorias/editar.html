<section class="container section reveal">
  <header class="page-header">
    <div class="page-header__copy">
      <h1 class="page-header__title" data-i18n="categories.editTitle">Editar categoría</h1>
      <p class="page-header__subtitle" data-i18n="categories.subtitle">
        Organiza los productos en categorías claras.
      </p>
    </div>
    <div class="page-header__actions">
      <a href="#categorias" class="btn btn--ghost" data-i18n="common.back">Volver</a>
    </div>
  </header>

  <div class="form-layout">
    <div class="formulario reveal">
      <form id="form" class="form__container" novalidate>
        <input type="hidden" id="identificador" />
        <div class="form-group">
          <label for="nombre" class="form__label" data-i18n="categories.name">Nombre de la categoría</label>
          <input type="text" name="nombre" id="nombre" class="form__input" data-required="true" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="descripcion" class="form__label" data-i18n="categories.description">Descripción</label>
          <input type="text" name="descripcion" id="descripcion" class="form__input" data-required="true" />
        </div>
        <div class="form__actions">
          <button type="submit" class="btn btn--block btn--block-mobile" data-i18n="common.save">Guardar</button>
          <a href="#categorias" class="btn btn--ghost btn--block btn--block-mobile" data-i18n="common.cancel">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</section>
