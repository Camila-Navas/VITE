<section class="container section reveal">
  <header class="page-header">
    <div class="page-header__copy">
      <h1 class="page-header__title" data-i18n="products.title">Productos</h1>
      <p class="page-header__subtitle" data-i18n="products.subtitle">
        Administra el catálogo de productos y sus categorías.
      </p>
    </div>
    <div class="page-header__actions">
      <a href="#crearproductos" class="btn" data-i18n="products.new">Nuevo producto</a>
    </div>
  </header>

  <div class="tabla card--table reveal">
    <div class="table-wrap">
      <table id="tabla">
        <caption data-i18n="products.listTitle">Listado de productos</caption>
        <thead>
          <tr>
            <th scope="col" data-i18n="products.name">Nombre</th>
            <th scope="col" data-i18n="products.description">Descripción</th>
            <th scope="col" data-i18n="products.price">Precio</th>
            <th scope="col" data-i18n="products.category">Categoría</th>
            <th scope="col" data-i18n="common.actions">Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>
